<figure class="diagram">
  <svg class="diagram__svg" viewBox="0 0 700 230" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="diagram-title">
    <title id="diagram-title">Deploy architecture: GitHub Actions assumes an OIDC role to push to S3, served via CloudFront to visitors over TLS issued by ACM after Cloudflare DNS cert validation.</title>

    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="var(--accent)"></path>
      </marker>
    </defs>

    <g font-family="var(--font-mono)" font-size="12" fill="var(--text)">
      <!-- top lane: GitHub Actions -> OIDC -> S3 -> CloudFront -> Visitor -->

      <rect x="8" y="18" width="96" height="66" rx="8" class="diagram__box"></rect>
      <circle cx="56" cy="40" r="10" class="diagram__icon"></circle>
      <text x="56" y="72" text-anchor="middle">GitHub</text>
      <text x="56" y="86" text-anchor="middle">Actions</text>

      <line x1="108" y1="51" x2="140" y2="51" class="diagram__arrow" marker-end="url(#arrow)"></line>

      <rect x="144" y="18" width="80" height="66" rx="8" class="diagram__box"></rect>
      <path d="M184,28 l14,6 v12 c0,10 -6,16 -14,20 c-8,-4 -14,-10 -14,-20 v-12 z" class="diagram__icon"></path>
      <text x="184" y="72" text-anchor="middle">OIDC</text>

      <line x1="228" y1="51" x2="336" y2="51" class="diagram__arrow" marker-end="url(#arrow)"></line>
      <text x="282" y="42" text-anchor="middle" class="diagram__label">assumes role</text>

      <rect x="340" y="18" width="80" height="66" rx="8" class="diagram__box"></rect>
      <ellipse cx="380" cy="34" rx="12" ry="5" class="diagram__icon-outline"></ellipse>
      <path d="M368,34 v12 a12,5 0 0 0 24,0 v-12" class="diagram__icon-outline"></path>
      <text x="380" y="72" text-anchor="middle">S3</text>

      <line x1="424" y1="51" x2="456" y2="51" class="diagram__arrow" marker-end="url(#arrow)"></line>

      <rect x="460" y="18" width="90" height="66" rx="8" class="diagram__box"></rect>
      <circle cx="505" cy="36" r="11" class="diagram__icon-outline"></circle>
      <path d="M494,36 h22 M505,25 v22 M497,28 a15,15 0 0 0 0,16 M513,28 a15,15 0 0 1 0,16" class="diagram__icon-outline"></path>
      <text x="505" y="72" text-anchor="middle">CloudFront</text>

      <line x1="554" y1="51" x2="586" y2="51" class="diagram__arrow" marker-end="url(#arrow)"></line>

      <rect x="590" y="18" width="88" height="66" rx="8" class="diagram__box"></rect>
      <rect x="614" y="30" width="40" height="26" rx="2" class="diagram__icon-outline"></rect>
      <line x1="628" y1="60" x2="640" y2="60" class="diagram__icon-outline"></line>
      <text x="634" y="72" text-anchor="middle">Visitor</text>

      <!-- bottom lane: Cloudflare DNS -> ACM -->

      <rect x="144" y="140" width="110" height="66" rx="8" class="diagram__box"></rect>
      <path d="M172,164 a10,10 0 0 1 19,-3 a8,8 0 0 1 2,16 h-24 a7,7 0 0 1 3,-13z" class="diagram__icon-outline"></path>
      <text x="199" y="194" text-anchor="middle">Cloudflare</text>
      <text x="199" y="207" text-anchor="middle">DNS</text>

      <line x1="258" y1="173" x2="456" y2="173" class="diagram__arrow" marker-end="url(#arrow)"></line>
      <text x="357" y="164" text-anchor="middle" class="diagram__label">cert validation</text>

      <rect x="460" y="140" width="90" height="66" rx="8" class="diagram__box"></rect>
      <path d="M505,150 l14,6 v12 c0,10 -6,16 -14,20 c-8,-4 -14,-10 -14,-20 v-12 z" class="diagram__icon"></path>
      <text x="505" y="194" text-anchor="middle">ACM</text>

      <!-- TLS: ACM feeds up into CloudFront -->
      <line x1="505" y1="140" x2="505" y2="86" class="diagram__arrow" marker-end="url(#arrow)"></line>
      <text x="527" y="115" text-anchor="middle" class="diagram__label">TLS</text>
    </g>
  </svg>
  <figcaption class="diagram__caption">{{ .Site.Params.diagramCaption }}</figcaption>
</figure>
